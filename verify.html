<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Verify your certificate authenticity — Null and Void QA Course" />
  <title>Certificate Verification — Null and Void QA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", -apple-system, system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2e2e2e 100%);
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 600px;
      background: #222;
      border-radius: 16px;
      padding: 2rem;
      border: 1px solid #3a3a3a;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #00e5ff, #ff2d78);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #9a9a9a;
      font-size: 1rem;
    }

    .search-form {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    input, button {
      font-family: inherit;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      border: none;
      font-size: 1rem;
      transition: all 0.2s;
    }

    input {
      flex: 1;
      background: #1a1a1a;
      color: #f0f0f0;
      border: 1px solid #3a3a3a;
    }

    input:focus {
      outline: none;
      border-color: #00e5ff;
      box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.2);
    }

    button {
      background: linear-gradient(135deg, #00e5ff, #00b8d4);
      color: #000;
      font-weight: 600;
      cursor: pointer;
      padding: 0.75rem 1.5rem;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 229, 255, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .result {
      display: none;
      padding: 1.5rem;
      border-radius: 12px;
      margin-top: 2rem;
    }

    .result.valid {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid #10b981;
    }

    .result.invalid {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid #ef4444;
    }

    .result-icon {
      font-size: 2rem;
      margin-bottom: 1rem;
      text-align: center;
    }

    .result-title {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .result-details {
      display: grid;
      gap: 0.75rem;
      margin-top: 1rem;
      font-size: 0.95rem;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
    }

    .detail-label {
      color: #9a9a9a;
    }

    .detail-value {
      font-weight: 600;
    }

    .error-message {
      color: #ef4444;
      text-align: center;
      margin-top: 1rem;
    }

    .success-message {
      color: #10b981;
      text-align: center;
      margin-top: 1rem;
    }

    .leaderboard {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid #3a3a3a;
    }

    .leaderboard-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      text-align: center;
    }

    .leaderboard-list {
      display: grid;
      gap: 0.75rem;
    }

    .leaderboard-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      border-left: 3px solid #00e5ff;
    }

    .leaderboard-rank {
      font-weight: 600;
      font-size: 1.1rem;
      margin-right: 1rem;
      color: #00e5ff;
    }

    .leaderboard-name {
      flex: 1;
    }

    .leaderboard-track {
      font-size: 0.9rem;
      color: #9a9a9a;
    }

    .leaderboard-date {
      font-size: 0.85rem;
      color: #9a9a9a;
    }

    .back-link {
      text-align: center;
      margin-top: 2rem;
    }

    .back-link a {
      color: #00e5ff;
      text-decoration: none;
      font-weight: 500;
    }

    .back-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .container { padding: 1.5rem; }
      h1 { font-size: 1.3rem; }
      .search-form { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🎓</div>
      <h1 data-i18n="verify.title">Certificate Verification</h1>
      <p class="subtitle" data-i18n="verify.subtitle">Confirm the authenticity of a certificate</p>
    </div>

    <div class="search-form">
      <input
        type="text"
        id="verifyCode"
        data-i18n-placeholder="verify.inputPlaceholder"
        maxlength="8"
      />
      <button id="verifyButton" onclick="verifyCertificate()" data-i18n="verify.verifyButton">Verify</button>
    </div>
    <div id="loginPrompt" style="display:none; margin-top:1rem; text-align:center;">
      <p style="color:#f0f0f0; margin-bottom:0.5rem;" data-i18n="verify.loginPrompt">Please sign in to verify certificates.</p>
      <a href="/" class="btn" style="background:#00e5ff; color:#000; padding:0.6rem 1rem; border-radius:8px; text-decoration:none;" data-i18n="verify.loginLink">Sign in to verify certificates</a>
    </div>

    <div id="result" class="result"></div>

      <div id="leaderboard" class="leaderboard" style="display:none;">
      <div class="leaderboard-title" data-i18n="verify.leaderboardTitle">🏆 Recent certificates</div>
      <div id="leaderboardList" class="leaderboard-list"></div>
    </div>

    <div class="back-link">
      <a href="/" data-i18n="verify.backToCourse">← Back to course</a>
    </div>
  </div>

  <script>
    // Simulated certificate database (in production, this would be handled by a backend)
    const CERTIFICATES = {};

    function isAuthenticated() {
      return window.NVAuth && window.NVAuth.isAuthenticated;
    }

    // When page loads, load certificates from localStorage
    function initCertificates() {
      if (!isAuthenticated()) return;
      try {
        const certs = JSON.parse(localStorage.getItem('testers-guild-certificates') || '[]');
        certs.forEach(cert => {
          if (cert.verifyCode) {
            CERTIFICATES[cert.verifyCode] = cert;
          }
        });
      } catch (e) {
        console.error('Failed to load certificates:', e);
      }
    }

    function verifyCertificate() {
      if (!isAuthenticated()) {
        const resultDiv = document.getElementById('result');
        resultDiv.classList.remove('valid');
        resultDiv.classList.add('invalid');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `<p class="error-message">${t('verify.errorSignIn')}</p>`;
        return;
      }

      const code = document.getElementById('verifyCode').value.trim().toUpperCase();
      const resultDiv = document.getElementById('result');

      if (!code || code.length !== 8) {
        resultDiv.innerHTML = `<p class="error-message">${t('verify.errorInvalidCode')}</p>`;
        return;
      }

      const cert = CERTIFICATES[code];

      if (cert) {
        // Valid certificate
        const trackData = findTrackData(cert.trackId);
        const locale = window.lang === 'pt' ? 'pt-BR' : 'en-US';
        const completedDate = new Date(cert.completedDate).toLocaleDateString(locale, {
          year: 'numeric',
          month: 'long',
          day: 'numeric'
        });

        // Recompute verification code using both current demo secret (if present)
        // and without secret to remain backwards-compatible with older certificates.
        function computeHash(secret) {
          const s = (typeof secret === 'string') ? secret : '';
          const str = `${s}${cert.userName}${cert.trackId}${cert.completedDate}`;
          let hash = 0;
          for (let i = 0; i < str.length; i++) {
            const char = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
          }
          return Math.abs(hash).toString(16).substring(0,8).toUpperCase();
        }

        const secretPresent = (typeof window.TG_CERT_SECRET !== 'undefined') ? String(window.TG_CERT_SECRET) : null;
        const recomputedWith = secretPresent !== null ? computeHash(secretPresent) : null;
        const recomputedWithout = computeHash('');

        const matches = (recomputedWith === code) || (recomputedWithout === code);
        if (!matches) {
          resultDiv.classList.remove('valid');
          resultDiv.classList.add('invalid');
          resultDiv.style.display = 'block';
          resultDiv.innerHTML = `
            <div class="result-icon">❌</div>
            <div class="result-title">${t('verify.invalidCertificateTitle')}</div>
            <p class="error-message">${t('verify.invalidCertificateMessage')}</p>
          `;
          showLeaderboard();
          return;
        }

        resultDiv.classList.remove('invalid');
        resultDiv.classList.add('valid');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
          <div class="result-icon">✅</div>
          <div class="result-title">${t('verify.certificateVerifiedTitle')}</div>
          <div class="result-details">
            <div class="detail-row">
              <span class="detail-label">${t('verify.labels.name')}</span>
              <span class="detail-value">${escapeHtml(cert.userName)}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">${t('verify.labels.path')}</span>
              <span class="detail-value">${trackData ? trackData.icon + ' ' + trackData.title : cert.trackId}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">${t('verify.labels.date')}</span>
              <span class="detail-value">${completedDate}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">${t('verify.labels.code')}</span>
              <span class="detail-value">${code}</span>
            </div>
          </div>
          <p class="success-message">${t('verify.certificateVerifiedSuccess').replace('{date}', completedDate)}</p>
        `;
      } else {
        // Certificate not found
        resultDiv.classList.remove('valid');
        resultDiv.classList.add('invalid');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
          <div class="result-icon">❌</div>
          <div class="result-title">${t('verify.certificateNotFoundTitle')}</div>
          <p class="error-message">${t('verify.certificateNotFoundMessage')}</p>
        `;
      }

      showLeaderboard();
    }

    function findTrackData(trackId) {
      // Search in main tracks array
      if (Array.isArray(window.TG_QAWAY_TRACKS)) {
        const track = window.TG_QAWAY_TRACKS.find(t => t.id === trackId);
        if (track) return track;
      }

      // Search performance track object
      if (window.TG_PERFORMANCE_TRACK && window.TG_PERFORMANCE_TRACK.id === trackId) {
        return window.TG_PERFORMANCE_TRACK;
      }

      // Search mentorship track object if it exists
      if (window.TG_MENTORSHIP && window.TG_MENTORSHIP.id === trackId) {
        return window.TG_MENTORSHIP;
      }

      // Search mobile labs array
      if (Array.isArray(window.TG_MOBILE_LABS)) {
        const mobileTrack = window.TG_MOBILE_LABS.find(t => t.id === trackId);
        if (mobileTrack) return mobileTrack;
      }

      return null;
    }

    function showLeaderboard() {
      if (!isAuthenticated()) return;
      const certs = Object.values(CERTIFICATES);
      if (certs.length === 0) return;

      // Sort by newest first
      const sorted = certs.sort((a, b) => 
        new Date(b.generatedAt) - new Date(a.generatedAt)
      ).slice(0, 5);

      const leaderboardDiv = document.getElementById('leaderboard');
      const listDiv = document.getElementById('leaderboardList');
      const locale = window.lang === 'pt' ? 'pt-BR' : 'en-US';

      listDiv.innerHTML = sorted.map((cert, index) => {
        const trackData = findTrackData(cert.trackId);
        const date = new Date(cert.completedDate).toLocaleDateString(locale);
        return `
          <div class="leaderboard-item">
            <div class="leaderboard-rank">#${index + 1}</div>
            <div>
              <div class="leaderboard-name">${escapeHtml(cert.userName)}</div>
              <div class="leaderboard-track">${trackData ? trackData.icon + ' ' + trackData.title : cert.trackId} • ${date}</div>
            </div>
          </div>
        `;
      }).join('');

      leaderboardDiv.style.display = 'block';
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return String(text).replace(/[&<>"']/g, m => map[m]);
    }

    // Support Enter key
    document.getElementById('verifyCode').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') verifyCertificate();
    });

    // Restore login state from localStorage for this verification page.
    if (!window.NVAuth) {
      window.NVAuth = {
        user: null,
        isAuthenticated: false,
        getUserName() {
          return this.user ? this.user.name : null;
        },
      };
      try {
        const savedUser = localStorage.getItem('nv_auth_user');
        if (savedUser) {
          window.NVAuth.user = JSON.parse(savedUser);
          window.NVAuth.isAuthenticated = true;
        }
      } catch (e) {
        console.warn('Failed to restore auth state:', e);
      }
    }

    // Init on page load
    window.addEventListener('load', () => {
      // If user is not authenticated, hide verification UI and show login prompt
      const isAuthed = (window.NVAuth && window.NVAuth.isAuthenticated);
      if (!isAuthed) {
        const form = document.querySelector('.search-form');
        if (form) form.style.display = 'none';
        const loginPrompt = document.getElementById('loginPrompt');
        if (loginPrompt) loginPrompt.style.display = 'block';
        // Do not load certificates for unauthenticated users
        return;
      }

      initCertificates();
      showLeaderboard();
    });
  </script>

  <!-- Load track and certificate data -->
  <script>window.lang = new URLSearchParams(window.location.search).get('lang') === 'pt' ? 'pt' : 'en'; document.documentElement.lang = window.lang === 'pt' ? 'pt-BR' : 'en';</script>
  <script src="js/i18n.js"></script>
  <script src="js/app-i18n.js"></script>
  <script>
    function applyVerifyI18n() {
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        el.textContent = t(el.dataset.i18n);
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach((el) => {
        el.placeholder = t(el.dataset.i18nPlaceholder);
      });
      document.querySelectorAll('[data-i18n-title]').forEach((el) => {
        el.title = t(el.dataset.i18nTitle);
      });
    }
    window.addEventListener('DOMContentLoaded', applyVerifyI18n);
  </script>
  <script src="data/tracks.js"></script>
  <script src="data/cert-secret.js"></script>
  <script src="data/performance-track.js"></script>
  <script src="data/mentorship.js"></script>
  <script src="data/mobile-labs.js"></script>
  <script src="data/translations-en.js"></script>
</body>
</html>
